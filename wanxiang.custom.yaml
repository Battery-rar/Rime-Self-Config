patch:
  #——————————功能开关——————————
  switches/@0:
  switches/@3/reset: 1  #表情
  switches/@10/reset: 1  #超级提示
  # @7 代表在 switches 的第8组里加入 reset: 1 参数,即可长期启用
  
  #——————————Super Tips——————————
  # 修改 Super Tips 核心参数
  super_tips/tips_key: "comma"           # 默认逗号，可改为 "period", "semicolon" 等
  super_tips/disabled_types:             # 在下方列表内填入你想禁用的类型
    
  #追加用户自己的 tips 文件
  super_tips/files/+:
    - lua/data/my_tips.txt
  
  #——————————Kaomoji——————————
  kaomoji:
    files:
      - lua/data/kaomoji.txt
      - lua/data/kaomoji_user.txt  # 用户自定义文件
      
  engine/translators/+:
    - lua_translator@*wanxiang.kaomoji
    
  recognizer/patterns/+:
    kaomoji: "^/km[A-Za-z7890]*$"
  
  #用户词库
  super_replacer/rules/@2/files/+:
    - lua/data/my_others.txt
    
  custom_phrase/user_dict: custom_phrase

  # 固定词库：统一挂载 user.dict.yaml
  translator/packs/+:
    - user
  
  #——————————模糊音&纠错——————————
  speller/algebra/+:
    - derive/([i])n$/$1ng/                                   # in→ing
    - derive/([i])ng$/$1n/                                   # ing→in
      
  #——————————修改Processors&Segmentors以删除英语功能——————————
  engine/processors:
    - lua_processor@*wanxiang.super_processor
    - lua_processor@*wanxiang.user_predict*P
    - lua_processor@*wanxiang.partial_commit
    - lua_processor@*wanxiang.super_tips
    - lua_processor@*wanxiang.super_sequence*P
    - recognizer
    - key_binder
    - lua_processor@*wanxiang.key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
    
  engine/segmentors:
    - matcher
    - abc_segmentor
    - affix_segmentor@wanxiang_reverse
    - affix_segmentor@add_user_dict
    - punct_segmentor
    - fallback_segmentor
    
